<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>SPG — Sale Daily</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles_sd.css">
</head>
<body>
  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Loading Overlay -->
  <div id="loader" class="loader-overlay hidden">
    <div class="loader-spinner"></div>
  </div>

  <!-- App Container -->
  <div id="app"></div>

  <!-- Module Switcher -->
  <div class="mod-switch-btn no-print" onclick="toggleModuleSwitcher()">🔀</div>
  <div id="modSwitchPopup" class="mod-switch-popup" style="display:none"></div>

  <script src="js/api_sd.js"></script>
  <script src="js/screens_sd.js"></script>
  <script src="js/screens2_sd.js"></script>
  <script src="js/screens3_sd.js"></script>
  <script src="js/screens4_sd.js"></script>
  <script src="js/screens5_sd.js"></script>
  <script src="js/screens6_sd.js"></script>
  <script src="js/app_sd.js"></script>

  <script>
  async function toggleModuleSwitcher() {
    const popup = document.getElementById('modSwitchPopup');
    if (popup.style.display !== 'none') { popup.style.display = 'none'; return; }
    popup.innerHTML = '<div style="padding:20px;text-align:center;color:var(--tm)">กำลังโหลด...</div>';
    popup.style.display = 'block';
    try {
      const session = API.getSession();
      const resp = await API.post('get_modules', { token: session?.token });
      const mods = resp.data || resp || [];
      const list = Array.isArray(mods) ? mods : [];
      popup.innerHTML = `
        <div style='font-weight:700;padding:8px 12px;border-bottom:1px solid #e2e8f0;font-size:13px'>🔀 สลับ Module</div>
        ${list.map(m => `
          <div class='mod-switch-item' onclick='navigateToModule("${m.app_url}")'>
            <span style='font-size:24px'>${m.icon}</span>
            <div>
              <div style='font-weight:600;font-size:12px'>${m.module_name}</div>
              <div style='font-size:10px;color:#64748b'>${m.module_name_en}</div>
            </div>
          </div>`).join('')}`;
      if (list.length === 0) popup.innerHTML += '<div style="padding:12px;font-size:12px;color:var(--tm)">ไม่พบ module</div>';
    } catch(e) {
      popup.innerHTML = '<div style="padding:16px;color:red">❌ โหลดไม่ได้</div>';
    }
  }
  function navigateToModule(url) {
    if (!url) return;
    const session = API.getSession();
    const token = session?.token || '';
    const sep = url.includes('?') ? '&' : '?';
    window.open(`${url}${sep}token=${token}`, '_self');
  }
  document.addEventListener('click', (e) => {
    const popup = document.getElementById('modSwitchPopup');
    const btn = document.querySelector('.mod-switch-btn');
    if (popup && btn && !popup.contains(e.target) && !btn.contains(e.target)) popup.style.display = 'none';
  });
  </script>
</body>
</html>
